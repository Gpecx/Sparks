name: Android Release (AAB)

# Build manual do Android App Bundle (.aab) assinado, para upload no Play Console.
# É acionado SÓ manualmente (workflow_dispatch) — não roda em push, então nunca
# fica vermelho sozinho. O .aab sai como artifact do run.
#
# ─────────────────────────────────────────────────────────────────────────────
# SECRETS necessários (Settings → Secrets and variables → Actions):
#
#   Assinatura (keystore de upload):
#     ANDROID_KEYSTORE_BASE64   -> keystore em base64:  base64 -w0 release.keystore
#     RELEASE_STORE_PASSWORD    -> senha do keystore
#     RELEASE_KEY_ALIAS         -> alias da chave
#     RELEASE_KEY_PASSWORD      -> senha da chave
#
#   Config pública do Firebase (já usados pelo deploy web — mesmos nomes):
#     FIREBASE_API_KEY_ANDROID, FIREBASE_API_KEY_IOS, FIREBASE_API_KEY_WEB,
#     FIREBASE_APP_ID_ANDROID, FIREBASE_APP_ID_IOS, FIREBASE_APP_ID_WEB,
#     FIREBASE_AUTH_DOMAIN, FIREBASE_MEASUREMENT_ID, FIREBASE_MESSAGING_SENDER_ID,
#     FIREBASE_PROJECT_ID, FIREBASE_STORAGE_BUCKET
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

jobs:
  build-aab:
    name: Build signed AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # .env.public — config pública do Firebase, empacotada como asset pelo
      # `flutter build` (mesma lógica do deploy web). Sem ela o build falha
      # (asset declarado no pubspec) e o Firebase não inicializa em runtime.
      - name: Generate .env.public
        run: |
          {
            echo "FIREBASE_API_KEY_ANDROID=${{ secrets.FIREBASE_API_KEY_ANDROID }}"
            echo "FIREBASE_API_KEY_IOS=${{ secrets.FIREBASE_API_KEY_IOS }}"
            echo "FIREBASE_API_KEY_WEB=${{ secrets.FIREBASE_API_KEY_WEB }}"
            echo "FIREBASE_APP_ID_ANDROID=${{ secrets.FIREBASE_APP_ID_ANDROID }}"
            echo "FIREBASE_APP_ID_IOS=${{ secrets.FIREBASE_APP_ID_IOS }}"
            echo "FIREBASE_APP_ID_WEB=${{ secrets.FIREBASE_APP_ID_WEB }}"
            echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}"
            echo "FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID }}"
            echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"
            echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}"
            echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}"
          } > .env.public

      # .env (raiz) — lido pelo android/app/build.gradle.kts (signingConfig
      # release) via ../.env. Só contém referências de assinatura, não segredos
      # de servidor.
      - name: Generate signing .env
        run: |
          {
            echo "RELEASE_STORE_FILE=keystore/release.keystore"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}"
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}"
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}"
          } > .env

      - name: Restore keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/release.keystore

      - name: Flutter pub get
        run: flutter pub get

      # --no-tree-shake-icons: o app usa IconData não-constante (ícones
      # dinâmicos), incompatível com o tree-shaking de ícones do Flutter.
      - name: Build AAB
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
