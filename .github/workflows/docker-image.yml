name: GCP

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: gcp-prod
    env:
      PROJECT_ID: spark-v1-e0eb5
      REGION: southamerica-east1
      REPO: sparksite
      SERVICE: site
      # Artifact Registry (gcr.io foi desligado pela Google em 18/03/2025)
      IMAGE_NAME: southamerica-east1-docker.pkg.dev/spark-v1-e0eb5/sparksite/site:latest
    steps:
      # 1. Git checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Autenticacao na GCP (action dedicada, padrao atual)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # 3. Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # 4. Configura o Docker para o Artifact Registry de Sao Paulo
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 5. Gera o .env.public APENAS com as chaves PÚBLICAS do Firebase
      #    (públicas por design — apiKey web/appId etc.). É o único arquivo
      #    de config empacotado pelo `flutter build web`. Segredos de servidor
      #    (ASAAS/Gemini) NÃO entram aqui — ficam no Secret Manager das Functions.
      - name: Generate .env.public file
        run: |
          echo "FIREBASE_API_KEY_ANDROID=${{ secrets.FIREBASE_API_KEY_ANDROID }}" >> .env.public
          echo "FIREBASE_API_KEY_IOS=${{ secrets.FIREBASE_API_KEY_IOS }}" >> .env.public
          echo "FIREBASE_API_KEY_WEB=${{ secrets.FIREBASE_API_KEY_WEB }}" >> .env.public
          echo "FIREBASE_APP_ID_ANDROID=${{ secrets.FIREBASE_APP_ID_ANDROID }}" >> .env.public
          echo "FIREBASE_APP_ID_IOS=${{ secrets.FIREBASE_APP_ID_IOS }}" >> .env.public
          echo "FIREBASE_APP_ID_WEB=${{ secrets.FIREBASE_APP_ID_WEB }}" >> .env.public
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env.public
          echo "FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID }}" >> .env.public
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env.public
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.public
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env.public

      # 6. Constroi a imagem Docker (o build copia o .env gerado acima)
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      # 7. Push para o Artifact Registry
      - name: Push Docker image
        run: docker push $IMAGE_NAME

      # 8. Deploy no Cloud Run (mesma regiao do Artifact Registry / Functions)
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image $IMAGE_NAME \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 1 \
            --platform managed \
            --port 80 \
            --allow-unauthenticated
