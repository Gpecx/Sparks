<!DOCTYPE html>
<html>
<head>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-W647BW8W');</script>
  <!-- End Google Tag Manager -->

  <!--
    Base href substituído pelo valor de --base-href no flutter build.
    Deve começar e terminar com "/" para funcionar corretamente.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Acende o conhecimento todo dia: engenharia elétrica gamificada – trilhas, calculadoras, duelos e ranking, da NR-10 ao IEC 61850.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SPARK">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Viewport: viewport-fit=cover garante que o conteúdo ocupe a tela inteira
       no iPhone com notch sem deixar faixas brancas. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>SPARK — Acende o conhecimento. Todo dia.</title>
  <link rel="manifest" href="manifest.json">

  <!-- Splash inline: aparece imediatamente enquanto o JS Flutter carrega,
       evitando a percepção de tela branca no Safari iOS. -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      height: 100%;
      width: 100%;
    }
    #flutter-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0A0A0F;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #flutter-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #flutter-splash .spark-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #6C63FF, #3ECFCF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    #flutter-splash .spark-label {
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    #flutter-splash .spark-sub {
      color: #555;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      margin-top: 8px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.08); opacity: 0.85; }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-W647BW8W"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- Splash visível antes do Flutter inicializar -->
  <div id="flutter-splash">
    <div class="spark-logo">⚡</div>
    <div class="spark-label">SPARK</div>
    <div class="spark-sub">Carregando...</div>
  </div>

  <script>
    // Força o renderer HTML no web — mais compatível com Safari/iOS do que
    // CanvasKit (WebGL), que causa tela branca em versões antigas do Safari.
    window.flutterConfiguration = {
      renderer: "html"
    };
  </script>

  <!--
    flutter_bootstrap.js inicializa o Flutter. O splash acima é removido
    assim que o primeiro frame é renderizado via _flutter.loader.load().
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('flutter-splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async=""></script>

</body>
</html>
