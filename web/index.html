<!DOCTYPE html>
<html>
<head>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-W647BW8W');</script>
  <!-- End Google Tag Manager -->

  <!--
    Base href substituído pelo valor de --base-href no flutter build.
    Deve começar e terminar com "/" para funcionar corretamente.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Acende o conhecimento todo dia: engenharia elétrica gamificada – trilhas, calculadoras, duelos e ranking, da NR-10 ao IEC 61850.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SPARK">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Viewport: viewport-fit=cover garante que o conteúdo ocupe a tela inteira
       no iPhone com notch sem deixar faixas brancas. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=3">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png?v=3">
  <link rel="icon" type="image/png" href="favicon.png?v=3">

  <title>SPARK — Acende o conhecimento. Todo dia.</title>
  <link rel="manifest" href="manifest.json">

  <!-- Splash inline: aparece imediatamente enquanto o JS Flutter carrega,
       evitando a percepção de tela branca no Safari iOS. -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      height: 100%;
      width: 100%;
    }
    #flutter-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0A0A0F;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #flutter-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #flutter-splash .spark-logo {
      width: 110px;
      height: 110px;
      border-radius: 26px;
      overflow: hidden;
      margin-bottom: 20px;
      animation: pulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(34, 197, 94, 0.35);
    }
    #flutter-splash .spark-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #flutter-splash .spark-label {
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
    }
    #flutter-splash .spark-sub {
      color: #444;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      margin-top: 10px;
      animation: blink 1.4s ease-in-out infinite;
    }
    #flutter-splash .spark-error {
      color: #ef4444;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      margin-top: 16px;
      text-align: center;
      padding: 0 32px;
      display: none;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 40px rgba(34,197,94,0.35); }
      50%       { transform: scale(1.06); box-shadow: 0 0 60px rgba(34,197,94,0.55); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-W647BW8W"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- Splash visível antes do Flutter inicializar -->
  <div id="flutter-splash">
    <div class="spark-logo">
      <img src="icons/Icon-192.png" alt="Sparky" />
    </div>
    <div class="spark-label">SPARK</div>
    <div class="spark-sub" id="splash-sub">Carregando...</div>
    <div class="spark-error" id="splash-error">
      Não foi possível carregar o app.<br>
      Verifique sua conexão e <a href="javascript:location.reload()" style="color:#22c55e">tente novamente</a>.
    </div>
  </div>




  <!--
    flutter_bootstrap.js inicializa o Flutter. O splash é removido
    assim que o primeiro frame é renderizado via _flutter.loader.load().
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('flutter-splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async=""></script>

</body>
</html>
